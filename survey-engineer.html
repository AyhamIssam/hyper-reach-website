<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Choose Site Type</title>

  <style>
    :root{
      --bg:#0b1220;
      --card:#121b2f;
      --line:#23304f;
      --text:#eef3ff;
      --muted:#9fb0d0;
      --primary:#3b82f6;
    }

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:linear-gradient(180deg,#070b14,#0b1220);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .container{
      width:100%;
      max-width:420px;
      padding:20px;
    }

    .box{
      background:rgba(18,27,47,.95);
      border:1px solid var(--line);
      border-radius:22px;
      padding:28px 22px;
      text-align:center;
    }

    h1{
      margin:0 0 6px 0;
      font-size:22px;
    }

    .sub{
      color:var(--muted);
      font-size:14px;
      margin-bottom:26px;
    }

    /* ===== FIX HERE ===== */
    .buttons{
      display:flex;
      gap:14px;
      justify-content:center;
      margin-bottom:22px;
    }

    .btn{
      flex:1;
      padding:16px 0;
      border-radius:18px;
      text-decoration:none;
      font-weight:700;
      font-size:16px;
      color:#fff;
      background:linear-gradient(135deg,#2563eb,#3b82f6);
      transition:.2s;
      text-align:center;
    }

    .btn:hover{
      filter:brightness(1.1);
      transform:translateY(-1px);
    }
    /* =================== */

    .back{
      display:inline-block;
      font-size:13px;
      color:var(--muted);
      text-decoration:none;
    }

    .back:hover{
      color:#fff;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="box">
      <h1>Choose Site Type</h1>
      <div class="sub">
        Select the survey page
      </div>

      <div class="buttons">
        <a href="outdoor.html" class="btn">Outdoor</a>
        <a href="indoor.html" class="btn">Indoor</a>
      </div>

      <a href="survey-hub.html" class="back">
        ← Back to Survey Hub
      </a>
    </div>
  </div>
</body>
</html>
